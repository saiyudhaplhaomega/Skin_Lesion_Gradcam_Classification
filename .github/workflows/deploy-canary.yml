name: Deploy Backend (Canary)

on:
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      initial_weight:
        description: 'Initial canary weight (%)'
        required: true
        default: '5'
        type: choice
        options:
          - '5'
          - '10'
          - '25'

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: skin-lesion-${{ inputs.deploy_env || 'staging' }}

jobs:
  # ============ Step 1: Check baseline deployed ============
  check-baseline:
    name: Check Baseline Deployed
    runs-on: ubuntu-latest
    outputs:
      baseline_exists: ${{ steps.check.outputs.deployed }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Check if baseline has healthy targets
        id: check
        run: |
          BASELINE_TG=$(aws ssm get-parameter \
            --name /skin-lesion/${{ inputs.deploy_env }}/baseline-tg-arn \
            --query Parameter.Value --output text)
          echo "Baseline TG: $BASELINE_TG"

          HEALTHY=$(aws elbv2 describe-target-health \
            --target-group-arn $BASELINE_TG \
            --query 'length(TargetHealthDescriptions[?TargetHealth.State==`healthy`])' \
            --output text)
          echo "Healthy targets: $HEALTHY"

          if [ "$HEALTHY" -gt "0" ]; then
            echo "deployed=true" >> $GITHUB_OUTPUT
          else
            echo "deployed=false" >> $GITHUB_OUTPUT
          fi

  # ============ Step 2: Deploy canary version ============
  deploy-canary:
    name: Deploy Canary Version
    needs: check-baseline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Register canary task definition
        run: |
          IMAGE="${{ secrets.ECR_REGISTRY }}/skin-lesion-backend:${GITHUB_SHA}"
          echo "Using image: $IMAGE"

          aws ecs register-task-definition \
            --family skin-lesion-canary \
            --container-definitions "[{\"name\":\"backend\",\"image\":\"$IMAGE\",\"memory\":2048,\"cpu\":1024,\"portMappings\":[{\"containerPort\":8080}],\"logConfiguration\":{\"logDriver\":\"awslogs\",\"options\":{\"awslogs-group\":\"/ecs/skin-lesion-${{ inputs.deploy_env }}\"}},\"healthCheck\":{\"command\":[\"CMD-SHELL\",\"curl -f http://localhost:8080/health || exit 1\"],\"interval\":30,\"timeout\":5,\"retries\":3,\"startPeriod\":60}}]" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text

      - name: Update canary ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service skin-lesion-${{ inputs.deploy_env }}-canary \
            --task-definition skin-lesion-canary:${GITHUB_SHA} \
            --force-new-deployment

      - name: Wait for canary to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services skin-lesion-${{ inputs.deploy_env }}-canary

  # ============ Step 3: Shift initial canary weight ============
  shift-initial-weight:
    name: Shift ${{ inputs.initial_weight }}% Traffic to Canary
    needs: deploy-canary
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Shift weight to canary
        run: |
          BASELINE_TG=$(aws ssm get-parameter \
            --name /skin-lesion/${{ inputs.deploy_env }}/baseline-tg-arn \
            --query Parameter.Value --output text)
          CANARY_TG=$(aws ssm get-parameter \
            --name /skin-lesion/${{ inputs.deploy_env }}/canary-tg-arn \
            --query Parameter.Value --output text)
          WEIGHT=${{ inputs.initial_weight }}
          BASELINE_WEIGHT=$((100 - WEIGHT))

          echo "Shifting ${WEIGHT}% to canary, ${BASELINE_WEIGHT}% to baseline"

          aws elbv2 modify-target-group-weights \
            --target-group-arns $BASELINE_TG $CANARY_TG \
            --weights TargetGroup=$CANARY_TG,Weight=$WEIGHT TargetGroup=$BASELINE_TG,Weight=$BASELINE_WEIGHT

          # Update SSM canary weight parameter
          aws ssm put-parameter \
            --name /skin-lesion/${{ inputs.deploy_env }}/canary-weight \
            --value $WEIGHT \
            --overwrite --type String

  # ============ Step 4: Monitor canary ============
  monitor-canary:
    name: Monitor Canary (${{ inputs.initial_weight }}% traffic)
    needs: shift-initial-weight
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Monitor for 15 minutes
        run: |
          echo "Monitoring canary for 15 minutes..."
          echo "Watching CloudWatch for error rate spikes"

          sleep 900  # 15 minutes

      - name: Check canary health
        run: |
          CANARY_TG=$(aws ssm get-parameter \
            --name /skin-lesion/${{ inputs.deploy_env }}/canary-tg-arn \
            --query Parameter.Value --output text)

          HEALTHY=$(aws elbv2 describe-target-health \
            --target-group-arn $CANARY_TG \
            --query 'length(TargetHealthDescriptions[?TargetHealth.State==`healthy`])' \
            --output text)
          echo "Canary healthy targets: $HEALTHY"

          if [ "$HEALTHY" -eq "0" ]; then
            echo "ERROR: Canary has no healthy targets - rollback required"
            exit 1
          fi

  # ============ Step 5: Progressive shift or rollback ============
  progressive-shift:
    name: Progressive Shift to Canary
    needs: monitor-canary
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Check monitoring result
        run: |
          if [ "${{ needs.monitor-canary.result }}" == "failure" ]; then
            echo "Canary monitoring detected issues - triggering rollback"
            aws lambda invoke \
              --function-name skin-lesion-${{ inputs.deploy_env }}-auto-rollback \
              --payload '{"Records":[{"Sns":{"Message":"{\"AlarmName\":\"canary-monitoring-failed\"}"}}]}' \
              --invocation-type Event \
              response.json
            exit 1
          else
            echo "Canary monitoring passed - deployment successful"
            echo "Current canary weight: ${{ inputs.initial_weight }}%"
          fi
