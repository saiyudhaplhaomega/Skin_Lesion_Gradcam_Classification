name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.10"
  AWS_REGION: us-east-1

jobs:
  # ============ Backend CI ============
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Skin_Lesion_Classification_backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: Skin_Lesion_Classification_backend

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Skin_Lesion_Classification_backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check app/ --output-format=github
        continue-on-error: true

      - name: Type check with MyPy
        run: |
          pip install mypy
          mypy app/ --ignore-missing-imports --python-version=${{ env.PYTHON_VERSION }}
        continue-on-error: true

      - name: Run pytest
        run: |
          pip install pytest pytest-asyncio pytest-cov httpx
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term

      - name: Security scan with Bandit
        run: |
          pip install bandit
          bandit -r app/ -f json -o bandit-report.json || true
        continue-on-error: true

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          directory: .
        continue-on-error: true

  # ============ Frontend CI ============
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    if: false  # No frontend repo found - SKIP UNTIL ADDED
    defaults:
      run:
        working-directory: Skin_Lesion_Classification_frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: Skin_Lesion_Classification_frontend

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: Skin_Lesion_Classification_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint || true

      - name: Type check with TypeScript
        run: npm run type-check || true

      - name: Run tests
        run: npm test -- --passWithNoTests --coverage || true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:8080' }}

  # ============ Terraform CI ============
  terraform-ci:
    name: Terraform CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: infra/terraform

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: Terraform fmt check
        run: |
          terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform init
        run: |
          terraform init -backend=false

      - name: Terraform validate
        run: |
          terraform validate

      - name: Terraform plan (staging)
        if: github.ref == 'refs/heads/main'
        run: |
          terraform plan -var-file=environments/staging.tfvars -out=staging.plan
        continue-on-error: true

  # ============ Docker Build Test ============
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    if: false  # SKIP - needs Dockerfile + FastAPI app structure in Skin_Lesion_Classification_backend
    defaults:
      run:
        working-directory: Skin_Lesion_Classification_backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: Skin_Lesion_Classification_backend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t skin-lesion-backend:ci-test .
        continue-on-error: true

      - name: Run container health check
        if: success()
        run: |
          docker run -d --name ci-test-container \
            -p 8080:8080 \
            skin-lesion-backend:ci-test

          sleep 45
          curl -f http://localhost:8080/health || exit 1
          docker stop ci-test-container || true

  # ============ Dependency Review ============
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        continue-on-error: true

  # ============ Container Scan ==========
  container-scan:
    name: Container Scan
    runs-on: ubuntu-latest
    needs: docker-build
    if: false  # SKIP - docker-build disabled
    defaults:
      run:
        working-directory: Skin_Lesion_Classification_backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: Skin_Lesion_Classification_backend

      - name: Run Trivy container scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: skin-lesion-backend:ci-test
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
        continue-on-error: true

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: Skin_Lesion_Classification_backend/trivy-results.sarif
        continue-on-error: true
