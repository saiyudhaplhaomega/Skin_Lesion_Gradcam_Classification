name: Deploy Backend (Blue-Green)

on:
  push:
    branches: [main]
    paths:
      - "Skin_Lesion_Classification_backend/**"
      - ".github/workflows/deploy-backend-blue-green.yml"
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_rollback:
        description: 'Skip auto-rollback (for testing)'
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: skin-lesion-backend
  ECS_CLUSTER: skin-lesion-${{ inputs.deploy_env || 'staging' }}
  BACKEND_DIR: Skin_Lesion_Classification_backend

jobs:
  # ============ Phase 1: Build Docker Image ============
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-duration-seconds: 3600

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,prefix=,suffix=,format=raw
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ env.BACKEND_DIR }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image tag
        run: |
          echo "${{ steps.meta.outputs.tags }}" > image_tags.txt

      - name: Upload image tags artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tags
          path: image_tags.txt

  # ============ Phase 2: Determine Active Slot ============
  determine-slot:
    name: Determine Deployment Slot
    needs: build
    runs-on: ubuntu-latest
    outputs:
      deploy_slot: ${{ steps.read_slot.outputs.deploy_slot }}
      active_slot: ${{ steps.read_slot.outputs.active_slot }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Read active slot from SSM
        id: read_slot
        run: |
          SLOT=$(aws ssm get-parameter \
            --name /skin-lesion/${{ inputs.deploy_env || 'staging' }}/active-slot \
            --query Parameter.Value \
            --output text)
          echo "Active slot: $SLOT"

          # Deploy to the inactive slot
          if [ "$SLOT" == "blue" ]; then
            DEPLOY_SLOT="green"
          else
            DEPLOY_SLOT="blue"
          fi
          echo "Will deploy to: $DEPLOY_SLOT"

          echo "active_slot=$SLOT" >> $GITHUB_OUTPUT
          echo "deploy_slot=$DEPLOY_SLOT" >> $GITHUB_OUTPUT

  # ============ Phase 3: Deploy to Inactive Slot ============
  deploy-slot:
    name: Deploy to ${{ needs.determine-slot.outputs.deploy_slot }} Slot
    needs: [build, determine-slot]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Download image tags
        uses: actions/download-artifact@v4
        with:
          name: image-tags

      - name: Update ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ./${{ env.BACKEND_DIR }}/ecs-task-definition.json
          container-name: backend
          image: ${{ needs.build.outputs.image_tag }}

      - name: Register new task definition
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://task-definition.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text

      - name: Update ECS service (deploy to inactive slot)
        run: |
          DEPLOY_SLOT=${{ needs.determine-slot.outputs.deploy_slot }}
          ECS_SERVICE="skin-lesion-${{ inputs.deploy_env || 'staging' }}-${DEPLOY_SLOT}"

          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service $ECS_SERVICE \
            --task-definition skin-lesion-backend:${GITHUB_SHA} \
            --force-new-deployment

      - name: Wait for deployment to stabilize
        run: |
          DEPLOY_SLOT=${{ needs.determine-slot.outputs.deploy_slot }}
          ECS_SERVICE="skin-lesion-${{ inputs.deploy_env || 'staging' }}-${DEPLOY_SLOT}"
          echo "Waiting for ECS deployment to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services $ECS_SERVICE

  # ============ Phase 4: Health Check Validation ============
  validate:
    name: Health Check Validation
    needs: [build, determine-slot, deploy-slot]
    runs-on: ubuntu-latest
    outputs:
      health_check_passed: ${{ steps.health_check.outputs.passed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Wait for model to load
        run: |
          echo "Waiting 90s for model to load from S3..."
          sleep 90

      - name: Health check on inactive slot
        id: health_check
        run: |
          DEPLOY_SLOT=${{ needs.determine-slot.outputs.deploy_slot }}
          # Get the inactive slot's target group TG ARN
          if [ "$DEPLOY_SLOT" == "green" ]; then
            TG_ARN=$(aws ssm get-parameter \
              --name /skin-lesion/${{ inputs.deploy_env || 'staging' }}/green-tg-arn \
              --query Parameter.Value --output text)
          else
            TG_ARN=$(aws ssm get-parameter \
              --name /skin-lesion/${{ inputs.deploy_env || 'staging' }}/blue-tg-arn \
              --query Parameter.Value --output text)
          fi
          echo "Checking TG: $TG_ARN"

          # Describe targets to find the IP
          TARGET=$(aws elbv2 describe-target-health \
            --target-group-arn $TG_ARN \
            --query 'TargetHealthDescriptions[?TargetHealth.State==`healthy`].Target.Id | [0]' \
            --output text)
          echo "Healthy target: $TARGET"

          if [ "$TARGET" != "None" ] && [ -n "$TARGET" ]; then
            echo "Health check passed"
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "Health check failed - no healthy targets"
            echo "passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  # ============ Phase 5: Flip ALB to New Slot ============
  flip-alb:
    name: Flip ALB to ${{ needs.determine-slot.outputs.deploy_slot }} Slot
    needs: [build, determine-slot, deploy-slot, validate]
    if: needs.validate.outputs.health_check_passed == 'true'
    environment:
      name: ${{ inputs.deploy_env || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Flip ALB to inactive (now active) slot
        run: |
          DEPLOY_SLOT=${{ needs.determine-slot.outputs.deploy_slot }}
          ENV=${{ inputs.deploy_env || 'staging' }}

          # Determine the TG ARN for the deploy slot
          if [ "$DEPLOY_SLOT" == "green" ]; then
            TG_ARN=$(aws ssm get-parameter \
              --name /skin-lesion/${ENV}/green-tg-arn \
              --query Parameter.Value --output text)
          else
            TG_ARN=$(aws ssm get-parameter \
              --name /skin-lesion/${ENV}/blue-tg-arn \
              --query Parameter.Value --output text)
          fi
          echo "Flipping ALB to TG: $TG_ARN (slot: $DEPLOY_SLOT)"

          # Find the HTTP:80 listener ARN
          LISTENER_ARN=$(aws elbv2 describe-listeners \
            --load-balancer-arn ${{ secrets.ALB_ARN }} \
            --query 'Listeners[?Port==`80`].ListenerArn | [0]' \
            --output text)
          echo "Listener ARN: $LISTENER_ARN"

          # Update the listener to forward to the new active slot
          aws elbv2 modify-listener \
            --listener-arn $LISTENER_ARN \
            --default-actions Type=forward,TargetGroupArn=$TG_ARN

          # Update the SSM active slot parameter
          aws ssm put-parameter \
            --name /skin-lesion/${ENV}/active-slot \
            --value $DEPLOY_SLOT \
            --overwrite --type String

          echo "ALB flipped to ${DEPLOY_SLOT} slot"

      - name: Final health check
        run: |
          ENDPOINT="${{ inputs.deploy_env || 'staging' }}-api.skinlesion.com"
          curl -f https://${ENDPOINT}/health || exit 1
          echo "Production health check passed"

      - name: Notify Success
        if: success()
        run: |
          echo "Backend deployed successfully to production!"
          echo "Active slot: ${{ needs.determine-slot.outputs.deploy_slot }}"

  # ============ Phase 6: Auto-Rollback on Failure ============
  rollback:
    name: Auto-Rollback
    needs: [build, determine-slot, deploy-slot, validate]
    if: |
      failure() &&
      needs.validate.outputs.health_check_passed != 'true' &&
      ${{ inputs.skip_rollback != true }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Trigger rollback Lambda
        run: |
          aws lambda invoke \
            --function-name skin-lesion-${{ inputs.deploy_env || 'staging' }}-auto-rollback \
            --payload '{"Records":[{"Sns":{"Message":"{\"AlarmName\":\"deployment-health-check-failed\"}"}}]}' \
            --invocation-type Event \
            response.json
          echo "Auto-rollback triggered"

      - name: Notify Failure
        if: failure()
        run: |
          echo "Deployment failed. Auto-rollback Lambda triggered."
          echo "Check CloudWatch logs: /aws/lambda/skin-lesion-${{ inputs.deploy_env || 'staging' }}-auto-rollback"
