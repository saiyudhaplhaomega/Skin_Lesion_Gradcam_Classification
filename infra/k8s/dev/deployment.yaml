apiVersion: apps/v1
kind: Deployment
metadata:
  name: skin-lesion-backend
  namespace: skin-lesion-dev
  labels:
    app: skin-lesion-backend
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skin-lesion-backend
  template:
    metadata:
      labels:
        app: skin-lesion-backend
        environment: dev
    spec:
      containers:
        - name: skin-lesion-backend
          image: skin-lesion-backend:local
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
